<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Geaux AI — Orchestrator Org Chart</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />

<!--
  ==========================================================================
  GEAUX AI · ORCHESTRATOR ORG CHART — self-contained embeddable widget
  ==========================================================================
  Draw an orchestrator (claude-code) routing work down bezier connectors to
  seven department subagents. On load the wires draw themselves in; then a
  calm pulse of light travels DOWN each wire into its department, staggered.

  --- THEMING (swap these ~6 core vars at :root to recolor everything) -----
    --oc-bg          page / stage background (deep near-black)
    --oc-surface     node card fill
    --oc-line        hairline borders + resting wire tint
    --oc-ink         primary text
    --oc-muted       secondary text
    --oc-accent      PRIMARY brand accent (amber) — CEO + focus rings

  --- PER-DEPARTMENT HUES (the fan of colors) -----------------------------
    --oc-d1 … --oc-d7   one subtle accent per department, in DOM order:
       d1 Developers · d2 Designers · d3 Marketing · d4 Social
       d5 Finance · d6 Operations · d7 Legal
    To make the whole fan monochrome amber, set every --oc-d* to --oc-accent.

  --- MOTION / GEOMETRY KNOBS ---------------------------------------------
    --oc-wire-w / --oc-flow-w   resting wire + pulse stroke widths
    --oc-flow-dur               one pulse cycle (travel + rest)
    --oc-flow-seg               length of the lit comet segment
    --oc-radius                 node corner radius
  Motion fully stops under prefers-reduced-motion (static finished diagram).

  --- EMBEDDING ------------------------------------------------------------
  All styles are scoped under .oc-widget so the block can be dropped into a
  page without leaking. The connector <svg> is redrawn from live node
  positions via a ResizeObserver, so the widget adapts to any container
  width; a central-trunk layout kicks in automatically below ~680px.
  No network images — nodes + wires + glyphs are pure CSS/SVG.
  ==========================================================================
-->

<style>
  /* ---- scoped reset ---- */
  .oc-widget *,
  .oc-widget *::before,
  .oc-widget *::after { box-sizing: border-box; }

  .oc-widget {
    /* core theme */
    --oc-bg:      #101010;
    --oc-surface: #1a1917;
    --oc-line:    #2c2a27;
    --oc-ink:     #f3ede4;
    --oc-muted:   #a99f91;
    --oc-accent:  #e9a55c;

    /* department fan — warm→cool→warm, muted so it stays calm on near-black */
    --oc-d1: #e9a55c; /* Developers  · amber      */
    --oc-d2: #e28d6b; /* Designers   · terracotta */
    --oc-d3: #d98aa4; /* Marketing   · rose        */
    --oc-d4: #ac97dc; /* Social      · lavender    */
    --oc-d5: #67b4a4; /* Finance     · teal        */
    --oc-d6: #7ba7d6; /* Operations  · steel blue  */
    --oc-d7: #c6ba76; /* Legal       · sand olive  */

    /* geometry + motion */
    --oc-wire-w: 1.6px;
    --oc-flow-w: 2.4px;
    --oc-flow-dur: 3.4s;
    --oc-flow-seg: 15;
    --oc-radius: 13px;

    position: relative;
    background:
      radial-gradient(1200px 620px at 50% -8%, #241d14 0%, rgba(36,29,20,0) 60%),
      var(--oc-bg);
    color: var(--oc-ink);
    font-family: 'Inter', system-ui, sans-serif;
    line-height: 1.55;
    padding: 44px 26px 52px;
    overflow: hidden;
  }

  /* ---- optional heading (embedders may remove .oc-head) ---- */
  .oc-head { max-width: 1120px; margin: 0 auto 30px; text-align: center; }
  .oc-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: .24em; text-transform: uppercase;
    color: var(--oc-accent); margin: 0 0 12px;
  }
  .oc-title {
    font-family: 'Playfair Display', serif; font-weight: 800;
    font-size: clamp(24px, 4vw, 38px); line-height: 1.1;
    letter-spacing: -.01em; margin: 0; color: var(--oc-ink);
  }
  .oc-title em { color: var(--oc-accent); font-style: normal; }
  .oc-lede {
    color: var(--oc-muted); font-size: clamp(13.5px, 1.6vw, 15px);
    max-width: 540px; margin: 12px auto 0;
  }

  /* ---- stage ---- */
  .oc-chart {
    position: relative;
    max-width: 1120px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* connector layer sits behind the nodes */
  .oc-svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    overflow: visible;
  }

  /* ---- CEO / orchestrator node ---- */
  .oc-ceo {
    position: relative; z-index: 2;
    display: flex; align-items: center; gap: 14px;
    background: linear-gradient(165deg, #221f1b 0%, var(--oc-surface) 120%);
    border: 1px solid var(--oc-line);
    border-radius: var(--oc-radius);
    padding: 15px 22px 15px 16px;
    box-shadow: 0 0 0 1px rgba(233,165,92,.10), 0 18px 40px rgba(0,0,0,.5);
    cursor: default; outline: none;
    margin-bottom: 72px;
  }
  .oc-ceo::after { /* breathing halo */
    content: ""; position: absolute; inset: -1px; border-radius: inherit;
    box-shadow: 0 0 0 0 rgba(233,165,92,.34);
    animation: oc-breathe 4.2s ease-in-out infinite; pointer-events: none;
  }
  .oc-ceo .oc-glyph {
    width: 44px; height: 44px; flex: none;
    display: grid; place-items: center; border-radius: 11px;
    color: var(--oc-accent);
    background: radial-gradient(circle at 50% 40%, rgba(233,165,92,.20), rgba(233,165,92,.04));
    border: 1px solid rgba(233,165,92,.30);
  }
  .oc-ceo .oc-glyph svg { width: 24px; height: 24px; }
  .oc-ceo-code {
    font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
    letter-spacing: .16em; text-transform: lowercase; color: var(--oc-accent);
    display: block; margin-bottom: 2px;
  }
  .oc-ceo-name {
    font-family: 'Playfair Display', serif; font-weight: 800;
    font-size: 20px; color: var(--oc-ink); display: block; line-height: 1.05;
  }
  .oc-ceo-sub {
    font-size: 12px; color: var(--oc-muted); display: block; margin-top: 3px;
  }

  /* ---- department row ---- */
  .oc-depts {
    position: relative; z-index: 2;
    display: flex; gap: 13px; width: 100%; align-items: stretch;
  }
  .oc-dept {
    flex: 1 1 0; min-width: 0;
    position: relative;
    background: var(--oc-surface);
    border: 1px solid var(--oc-line);
    border-radius: var(--oc-radius);
    padding: 16px 12px 15px;
    display: flex; flex-direction: column; align-items: center; text-align: center;
    cursor: default; outline: none;
    transition: transform .2s ease, border-color .2s ease,
                box-shadow .2s ease, opacity .25s ease, filter .25s ease;
  }
  .oc-dept::before { /* top accent seam in the department hue */
    content: ""; position: absolute; top: -1px; left: 18%; right: 18%; height: 2px;
    border-radius: 2px; background: var(--dc);
    opacity: .55; transition: opacity .25s ease, left .25s ease, right .25s ease;
  }
  .oc-dept .oc-glyph {
    width: 34px; height: 34px; margin-bottom: 10px; flex: none;
    display: grid; place-items: center; border-radius: 9px; color: var(--dc);
    background: color-mix(in srgb, var(--dc) 14%, transparent);
    border: 1px solid color-mix(in srgb, var(--dc) 34%, transparent);
    transition: box-shadow .25s ease, background .25s ease;
  }
  .oc-dept .oc-glyph svg { width: 19px; height: 19px; }
  .oc-code {
    font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
    letter-spacing: .14em; text-transform: uppercase; color: var(--dc);
    margin-bottom: 4px;
  }
  .oc-name {
    font-family: 'Playfair Display', serif; font-weight: 700;
    font-size: 15px; color: var(--oc-ink); line-height: 1.15;
  }
  .oc-role { font-size: 11px; color: var(--oc-muted); margin-top: 3px; }

  /* hover / focus lift */
  .oc-dept:hover, .oc-dept.is-active {
    transform: translateY(-4px);
    border-color: color-mix(in srgb, var(--dc) 55%, var(--oc-line));
    box-shadow: 0 14px 34px rgba(0,0,0,.5),
                0 0 0 1px color-mix(in srgb, var(--dc) 30%, transparent);
  }
  .oc-dept:hover::before, .oc-dept.is-active::before { opacity: 1; left: 8%; right: 8%; }
  .oc-dept:hover .oc-glyph, .oc-dept.is-active .oc-glyph {
    box-shadow: 0 0 18px color-mix(in srgb, var(--dc) 45%, transparent);
    background: color-mix(in srgb, var(--dc) 22%, transparent);
  }

  /* focus-visible ring (keyboard) */
  .oc-dept:focus-visible, .oc-ceo:focus-visible {
    box-shadow: 0 0 0 3px var(--oc-bg), 0 0 0 5px var(--oc-accent);
  }

  /* ---- dim siblings while one branch is engaged ---- */
  .oc-chart[data-active] .oc-dept:not(.is-active) { opacity: .34; filter: saturate(.55); }
  .oc-chart[data-active] .oc-branch { opacity: .10; transition: opacity .25s ease; }
  .oc-chart[data-active] .oc-branch.is-on { opacity: 1; }

  /* ---- SVG connector styling ---- */
  .oc-branch { transition: opacity .25s ease; }
  .oc-wire {
    fill: none; stroke: var(--dc); stroke-width: var(--oc-wire-w);
    stroke-linecap: round; opacity: .32;
    stroke-dasharray: var(--len); stroke-dashoffset: var(--len);
    animation: oc-draw 1.15s cubic-bezier(.6,.05,.2,1) forwards;
    animation-delay: var(--draw-delay);
  }
  .oc-flow {
    fill: none; stroke: var(--dc); stroke-width: var(--oc-flow-w);
    stroke-linecap: round; opacity: 0;
    stroke-dasharray: var(--oc-flow-seg) 999999;
    filter: drop-shadow(0 0 3px var(--dc)) drop-shadow(0 0 7px var(--dc));
    animation: oc-flow var(--oc-flow-dur) linear infinite;
    animation-delay: var(--flow-delay);
  }

  /* pulse-arrival glow on the receiving node, phase-locked to its wire */
  .oc-dept {
    animation: oc-arrive var(--oc-flow-dur) ease-in-out infinite;
    animation-delay: var(--flow-delay);
  }

  @keyframes oc-draw { to { stroke-dashoffset: 0; } }

  @keyframes oc-flow {
    0%   { stroke-dashoffset: calc(var(--oc-flow-seg) + var(--len)); opacity: 0; }
    4%   { opacity: 1; }
    46%  { stroke-dashoffset: 0; opacity: 1; }
    56%  { opacity: 0; }
    100% { stroke-dashoffset: 0; opacity: 0; }
  }

  @keyframes oc-arrive {
    0%, 40%   { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
    50%       { box-shadow: 0 0 22px -2px color-mix(in srgb, var(--dc) 60%, transparent),
                            0 0 0 1px color-mix(in srgb, var(--dc) 34%, transparent); }
    66%, 100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
  }

  @keyframes oc-breathe {
    0%, 100% { box-shadow: 0 0 0 0 rgba(233,165,92,.30); }
    50%      { box-shadow: 0 0 22px 3px rgba(233,165,92,.14); }
  }

  /* keep arrival glow from fighting the hover shadow */
  .oc-dept:hover, .oc-dept.is-active { animation-play-state: paused; }

  /* ---- narrow layout: 2-col grid, connectors become a central trunk ---- */
  .oc-chart.is-narrow .oc-ceo { margin-bottom: 60px; }
  .oc-chart.is-narrow .oc-depts {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 14px 46px; /* wide center gutter for the trunk */
  }
  .oc-chart.is-narrow .oc-dept { padding: 14px 10px; }

  /* ---- reduced motion: show the finished, static diagram ---- */
  @media (prefers-reduced-motion: reduce) {
    .oc-wire { animation: none; stroke-dashoffset: 0; }
    .oc-flow { display: none; }
    .oc-dept { animation: none; }
    .oc-ceo::after { animation: none; }
  }

  .oc-sr { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
</style>
</head>

<body style="margin:0; background:#101010;">

  <section class="oc-widget">
    <div class="oc-head">
      <p class="oc-eyebrow">How the work moves</p>
      <h2 class="oc-title">One <em>orchestrator</em>, seven specialists</h2>
      <p class="oc-lede">Every problem enters at the top. The orchestrator routes it down to the department that owns it. Watch the signal travel.</p>
    </div>

    <div class="oc-chart" id="ocChart" role="img"
         aria-label="Org chart. An orchestrator named claude-code routes every problem to seven departments: Developers, Designers, Marketing, Social, Finance, Operations, and Legal.">
      <!-- connectors injected here -->
      <svg class="oc-svg" id="ocSvg" aria-hidden="true"><g id="ocWires"></g></svg>
      <!-- CEO + departments injected here -->
    </div>
  </section>

<script>
(function () {
  "use strict";

  var CEO = {
    code: "claude-code",
    name: "Orchestrator",
    sub: "routes every problem",
    glyph: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.4"/><path d="M12 4v3.6M12 16.4V20M4 12h3.6M16.4 12H20M6.3 6.3l2.5 2.5M15.2 15.2l2.5 2.5M17.7 6.3l-2.5 2.5M8.8 15.2l-2.5 2.5"/></svg>'
  };

  var DEPTS = [
    { code: "DEV",       name: "Developers", role: "Engineering",
      g: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 8.5 5 12l3.5 3.5"/><path d="M15.5 8.5 19 12l-3.5 3.5"/><path d="M13.4 6.5l-2.8 11"/></svg>' },
    { code: "DESIGN",    name: "Designers",  role: "Design",
      g: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20l1-4 9-9 3 3-9 9-4 1z"/><path d="M13.5 6.5l3 3"/></svg>' },
    { code: "MARKETING", name: "Marketing",  role: "Growth",
      g: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10v4l9 4.5V5.5L4 10z"/><path d="M4 10H3.2M13 8.4a3.4 3.4 0 0 1 0 7.2"/></svg>' },
    { code: "SOCIAL",    name: "Social",     role: "Community",
      g: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="12" r="2.2"/><circle cx="17.5" cy="6" r="2.2"/><circle cx="17.5" cy="18" r="2.2"/><path d="M8 11l7.5-3.8M8 13l7.5 3.8"/></svg>' },
    { code: "FINANCE",   name: "Finance",    role: "Money",
      g: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><path d="M12 7v10M14.6 9.3c-.6-1-1.6-1.4-2.7-1.4-1.5 0-2.6.8-2.6 2 0 3 5.6 1.4 5.6 4.4 0 1.3-1.2 2.2-2.9 2.2-1.3 0-2.4-.5-3-1.5"/></svg>' },
    { code: "OPS",       name: "Operations",role: "Business",
      g: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2.8"/><path d="M12 3.5v2.6M12 17.9v2.6M20.5 12h-2.6M6.1 12H3.5M18 6l-1.8 1.8M7.8 16.2 6 18M18 18l-1.8-1.8M7.8 7.8 6 6"/></svg>' },
    { code: "LEGAL",     name: "Legal",      role: "Compliance",
      g: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v16M6.5 20h11M5 8.5h14"/><path d="M12 6l-7 2.5 2.6 4.4a3 3 0 0 1-5.2 0L5 8.5"/><path d="M12 6l7 2.5-2.6 4.4a3 3 0 0 0 5.2 0L19 8.5"/></svg>' }
  ];

  var NARROW = 680;          // px: below this, switch to central-trunk grid
  var STAGGER = 0.3;         // s: per-branch pulse offset (calm cascade)

  var chart = document.getElementById("ocChart");
  var svg   = document.getElementById("ocSvg");
  var wires = document.getElementById("ocWires");

  // --- build nodes -------------------------------------------------------
  var ceoEl = document.createElement("div");
  ceoEl.className = "oc-ceo";
  ceoEl.tabIndex = 0;
  ceoEl.setAttribute("aria-label", CEO.name + ", " + CEO.code + ", " + CEO.sub);
  ceoEl.innerHTML =
    '<span class="oc-glyph">' + CEO.glyph + '</span>' +
    '<span><span class="oc-ceo-code">' + CEO.code + '</span>' +
    '<span class="oc-ceo-name">' + CEO.name + '</span>' +
    '<span class="oc-ceo-sub">' + CEO.sub + '</span></span>';
  chart.appendChild(ceoEl);

  var deptsWrap = document.createElement("div");
  deptsWrap.className = "oc-depts";
  var deptEls = [];
  DEPTS.forEach(function (d, i) {
    var el = document.createElement("div");
    el.className = "oc-dept";
    el.tabIndex = 0;
    el.style.setProperty("--dc", "var(--oc-d" + (i + 1) + ")");
    el.style.setProperty("--flow-delay", (1.5 + i * STAGGER).toFixed(2) + "s");
    el.setAttribute("data-i", i);
    el.setAttribute("aria-label", d.name + ", " + d.role + " department");
    el.innerHTML =
      '<span class="oc-glyph">' + d.g + '</span>' +
      '<span class="oc-code">' + d.code + '</span>' +
      '<span class="oc-name">' + d.name + '</span>' +
      '<span class="oc-role">' + d.role + '</span>';
    deptsWrap.appendChild(el);
    deptEls.push(el);
  });
  chart.appendChild(deptsWrap);

  // --- geometry ----------------------------------------------------------
  function rel(el, base) {
    var r = el.getBoundingClientRect();
    return {
      left: r.left - base.left, top: r.top - base.top,
      right: r.right - base.left, bottom: r.bottom - base.top,
      cx: r.left - base.left + r.width / 2,
      cy: r.top - base.top + r.height / 2
    };
  }

  var branchEls = [];

  function layout() {
    var narrow = chart.clientWidth < NARROW;
    chart.classList.toggle("is-narrow", narrow);

    // let the DOM settle into the chosen layout before measuring
    var base = chart.getBoundingClientRect();
    var w = chart.clientWidth, h = chart.clientHeight;
    svg.setAttribute("viewBox", "0 0 " + w + " " + h);

    var ceo = rel(ceoEl, base);
    var frag = document.createDocumentFragment();
    branchEls = [];

    var sx = ceo.cx, sy = ceo.bottom;          // signal origin
    var cx = w / 2;                             // trunk axis (narrow mode)

    deptEls.forEach(function (node, i) {
      var n = rel(node, base);
      var d;

      if (!narrow) {
        // fan: smooth vertical S-curve from CEO to each node top
        var ex = n.cx, ey = n.top, dy = ey - sy;
        d = "M " + f(sx) + " " + f(sy) +
            " C " + f(sx) + " " + f(sy + dy * 0.55) +
            " "   + f(ex) + " " + f(ey - dy * 0.55) +
            " "   + f(ex) + " " + f(ey);
      } else {
        // central trunk: down the axis, then peel out to the node's inner side
        var isLeft = n.cx < cx;
        var ex2 = isLeft ? n.right : n.left;
        var ey2 = n.cy;
        var jy  = ey2;                          // junction height on the trunk
        d = "M " + f(sx) + " " + f(sy) +
            " C " + f(cx) + " " + f(sy + (jy - sy) * 0.5) +
            " "   + f(cx) + " " + f(jy - 30) +
            " "   + f(cx) + " " + f(jy) +
            " Q " + f((cx + ex2) / 2) + " " + f(jy - 14) +
            " "   + f(ex2) + " " + f(ey2);
      }

      var g = document.createElementNS(svg.namespaceURI, "g");
      g.setAttribute("class", "oc-branch");
      g.style.setProperty("--dc", "var(--oc-d" + (i + 1) + ")");
      g.style.setProperty("--draw-delay", (0.25 + i * 0.1).toFixed(2) + "s");
      g.style.setProperty("--flow-delay", (1.5 + i * STAGGER).toFixed(2) + "s");

      var wire = document.createElementNS(svg.namespaceURI, "path");
      wire.setAttribute("class", "oc-wire");
      wire.setAttribute("d", d);
      var flow = document.createElementNS(svg.namespaceURI, "path");
      flow.setAttribute("class", "oc-flow");
      flow.setAttribute("d", d);

      // real path length drives both the draw-in and the pulse gap
      wire.setAttribute("pathLength", "1"); // placeholder; replaced below
      g.appendChild(wire);
      g.appendChild(flow);
      frag.appendChild(g);
      branchEls.push(g);

      // measure after insertion for accurate length
      requestAnimationFrame(function () {
        var len = wire.getTotalLength();
        g.style.setProperty("--len", len.toFixed(1));
      });
    });

    wires.innerHTML = "";
    wires.appendChild(frag);
  }

  function f(n) { return Math.round(n * 10) / 10; }

  // --- interactivity: highlight one branch, dim the rest ----------------
  function activate(i) {
    chart.dataset.active = i;
    deptEls.forEach(function (el, k) { el.classList.toggle("is-active", k === i); });
    branchEls.forEach(function (g, k) { g.classList.toggle("is-on", k === i); });
  }
  function clearActive() {
    delete chart.dataset.active;
    deptEls.forEach(function (el) { el.classList.remove("is-active"); });
    branchEls.forEach(function (g) { g.classList.remove("is-on"); });
  }
  deptEls.forEach(function (el, i) {
    el.addEventListener("mouseenter", function () { activate(i); });
    el.addEventListener("mouseleave", clearActive);
    el.addEventListener("focus", function () { activate(i); });
    el.addEventListener("blur", clearActive);
  });

  // --- responsive redraw -------------------------------------------------
  var raf = null;
  function schedule() {
    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(layout);
  }
  if (window.ResizeObserver) new ResizeObserver(schedule).observe(chart);
  else window.addEventListener("resize", schedule);

  if (document.fonts && document.fonts.ready) document.fonts.ready.then(schedule);
  // initial paint (double rAF so grid/flex geometry is final before measuring)
  requestAnimationFrame(function () { requestAnimationFrame(layout); });
})();
</script>
</body>
</html>
